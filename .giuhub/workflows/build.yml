e: build-netmonitor

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build Android (placeholder)
        run: |
          echo "Building Android module..."
          mkdir -p build
          echo "ok" > build/result.txt

      - name: Package
        run: |
          zip -r NetMonitor-Pro-Full.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: netmonitor
          path: NetMonitor-Pro-Full.zip
