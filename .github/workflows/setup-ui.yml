name: Setup Android UI

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create complete Android app
        shell: python3 {0}
        run: |
          import os, textwrap

          def w(path, content):
              os.makedirs(os.path.dirname(path), exist_ok=True)
              with open(path, "w") as f:
                  f.write(textwrap.dedent(content).lstrip())
              print(f"  Created: {path}")

          SRC = "android/app/src/main/java/com/netmonitor/pro"
          RES = "android/app/src/main/res"

          w(f"{SRC}/core/NetEvent.kt", """
              package com.netmonitor.pro.core

              data class NetEvent(
                  val timestamp: Long = System.currentTimeMillis(),
                  val sourceIp: String = "",
                  val destIp: String = "",
                  val protocol: String = "TCP",
                  val port: Int = 0,
                  val bytesTransferred: Long = 0,
                  val direction: String = "OUT",
                  val appName: String = "unknown",
                  val riskLevel: Int = 0
              )
          """)

          w(f"{SRC}/core/EventBus.kt", """
              package com.netmonitor.pro.core

              object EventBus {
                  private val listeners = mutableListOf<(NetEvent) -> Unit>()
                  fun subscribe(listener: (NetEvent) -> Unit) { listeners.add(listener) }
                  fun publish(event: NetEvent) { listeners.toList().forEach { it(event) } }
                  fun clear() { listeners.clear() }
              }
          """)

          w(f"{SRC}/core/FeatureVector.kt", """
              package com.netmonitor.pro.core

              data class FeatureVector(
                  val avgPacketSize: Double = 0.0,
                  val connectionFrequency: Double = 0.0,
                  val uniqueDestinations: Int = 0,
                  val protocolDistribution: Map<String, Double> = emptyMap(),
                  val timeOfDay: Int = 0,
                  val totalBytes: Long = 0
              )
          """)

          w(f"{SRC}/core/FeatureExtractor.kt", """
              package com.netmonitor.pro.core

              import java.util.Calendar

              class FeatureExtractor {
                  fun extract(events: List<NetEvent>): FeatureVector {
                      if (events.isEmpty()) return FeatureVector()
                      val avgSize = events.map { it.bytesTransferred.toDouble() }.average()
                      val uniqueDest = events.map { it.destIp }.distinct().size
                      val protocols = events.groupBy { it.protocol }
                          .mapValues { it.value.size.toDouble() / events.size }
                      val totalBytes = events.sumOf { it.bytesTransferred }
                      val hour = Calendar.getInstance().get(Calendar.HOUR_OF_DAY)
                      return FeatureVector(avgSize, events.size.toDouble(), uniqueDest, protocols, hour, totalBytes)
                  }
              }
          """)

          w(f"{SRC}/core/RiskEngine.kt", """
              package com.netmonitor.pro.core

              class RiskEngine {
                  fun evaluate(features: FeatureVector): Int {
                      var risk = 0
                      if (features.totalBytes > 10_000_000) risk += 20
                      if (features.uniqueDestinations > 20) risk += 15
                      if (features.timeOfDay in 1..5) risk += 25
                      if (features.connectionFrequency > 100) risk += 20
                      if (features.avgPacketSize > 5000) risk += 10
                      return risk.coerceIn(0, 100)
                  }
                  fun getRiskLabel(score: Int): String = when {
                      score < 30 -> "LOW"
                      score < 60 -> "MEDIUM"
                      else -> "HIGH"
                  }
              }
          """)

          w(f"{SRC}/core/LeakDetector.kt", """
              package com.netmonitor.pro.core

              class LeakDetector {
                  fun scan(events: List<NetEvent>): List<LeakAlert> {
                      val alerts = mutableListOf<LeakAlert>()
                      for ((dest, destEvents) in events.groupBy { it.destIp }) {
                          val totalBytes = destEvents.sumOf { it.bytesTransferred }
                          if (totalBytes > 5_000_000) {
                              alerts.add(LeakAlert("HIGH_VOLUME", "Large transfer to $dest", "MEDIUM"))
                          }
                      }
                      val unusual = events.filter { it.port !in listOf(80, 443, 8080, 53) }
                      if (unusual.size > events.size * 0.3 && events.size > 5) {
                          alerts.add(LeakAlert("UNUSUAL_PORTS", "${'$'}{unusual.size} non-standard ports", "MEDIUM"))
                      }
                      return alerts
                  }
              }

              data class LeakAlert(val type: String, val message: String, val severity: String)
          """)

          w(f"{SRC}/ml/BehaviorModel.kt", """
              package com.netmonitor.pro.ml

              import com.netmonitor.pro.core.FeatureVector

              class BehaviorModel {
                  private val baseline = mutableListOf<FeatureVector>()
                  fun train(features: FeatureVector) {
                      baseline.add(features)
                      if (baseline.size > 100) baseline.removeAt(0)
                  }
                  fun predict(features: FeatureVector): Double {
                      if (baseline.isEmpty()) return 0.5
                      val avgBytes = baseline.map { it.totalBytes.toDouble() }.average()
                      val avgDest = baseline.map { it.uniqueDestinations.toDouble() }.average()
                      var anomaly = 0.0
                      if (avgBytes > 0) anomaly += ((features.totalBytes - avgBytes).coerceAtLeast(0.0)) / avgBytes * 0.5
                      if (avgDest > 0) anomaly += ((features.uniqueDestinations - avgDest).coerceAtLeast(0.0)) / avgDest * 0.5
                      return anomaly.coerceIn(0.0, 1.0)
                  }
              }
          """)

          w(f"{SRC}/ui/FlowGraphView.kt", """
              package com.netmonitor.pro.ui

              import android.content.Context
              import android.graphics.Canvas
              import android.graphics.Color
              import android.graphics.LinearGradient
              import android.graphics.Paint
              import android.graphics.Path
              import android.graphics.Shader
              import android.util.AttributeSet
              import android.view.View

              class FlowGraphView @JvmOverloads constructor(
                  context: Context, attrs: AttributeSet? = null
              ) : View(context, attrs) {

                  private val dataPoints = mutableListOf<Float>()
                  private val maxPoints = 30
                  private val linePaint = Paint(Paint.ANTI_ALIAS_FLAG).apply {
                      color = Color.parseColor("#1976D2"); strokeWidth = 4f; style = Paint.Style.STROKE
                  }
                  private val fillPaint = Paint(Paint.ANTI_ALIAS_FLAG).apply { style = Paint.Style.FILL }
                  private val gridPaint = Paint(Paint.ANTI_ALIAS_FLAG).apply {
                      color = Color.parseColor("#E0E0E0"); strokeWidth = 1f
                  }
                  private val textPaint = Paint(Paint.ANTI_ALIAS_FLAG).apply {
                      color = Color.parseColor("#9E9E9E"); textSize = 28f
                  }

                  fun addPoint(value: Float) {
                      dataPoints.add(value)
                      if (dataPoints.size > maxPoints) dataPoints.removeAt(0)
                      invalidate()
                  }

                  override fun onDraw(canvas: Canvas) {
                      super.onDraw(canvas)
                      val w = width.toFloat(); val h = height.toFloat(); val pad = 20f
                      for (i in 1..3) { val y = pad + (h - 2*pad)*i/4; canvas.drawLine(pad, y, w-pad, y, gridPaint) }
                      if (dataPoints.size < 2) { canvas.drawText("Waiting for data...", w/2-100, h/2, textPaint); return }
                      val maxVal = dataPoints.max().coerceAtLeast(1f)
                      val stepX = (w - 2*pad) / (maxPoints - 1)
                      val off = maxPoints - dataPoints.size
                      val lp = Path(); val fp = Path()
                      for (i in dataPoints.indices) {
                          val x = pad + (off+i)*stepX; val y = h - pad - (dataPoints[i]/maxVal)*(h-2*pad)
                          if (i==0) { lp.moveTo(x,y); fp.moveTo(x,h-pad); fp.lineTo(x,y) } else { lp.lineTo(x,y); fp.lineTo(x,y) }
                      }
                      fp.lineTo(pad+(off+dataPoints.size-1)*stepX, h-pad); fp.close()
                      fillPaint.shader = LinearGradient(0f, pad, 0f, h-pad, Color.parseColor("#401976D2"), Color.parseColor("#001976D2"), Shader.TileMode.CLAMP)
                      canvas.drawPath(fp, fillPaint); canvas.drawPath(lp, linePaint)
                  }
              }
          """)

          w(f"{SRC}/ui/EventAdapter.kt", """
              package com.netmonitor.pro.ui

              import android.graphics.Color
              import android.graphics.drawable.GradientDrawable
              import android.view.LayoutInflater
              import android.view.View
              import android.view.ViewGroup
              import android.widget.TextView
              import androidx.recyclerview.widget.RecyclerView
              import com.netmonitor.pro.R
              import com.netmonitor.pro.core.NetEvent
              import java.text.SimpleDateFormat
              import java.util.Date
              import java.util.Locale

              class EventAdapter : RecyclerView.Adapter<EventAdapter.VH>() {
                  private val events = mutableListOf<NetEvent>()

                  fun addEvent(event: NetEvent) {
                      events.add(0, event)
                      if (events.size > 50) events.removeAt(events.size - 1)
                      notifyDataSetChanged()
                  }

                  override fun onCreateViewHolder(parent: ViewGroup, viewType: Int): VH {
                      return VH(LayoutInflater.from(parent.context).inflate(R.layout.item_event, parent, false))
                  }

                  override fun onBindViewHolder(holder: VH, position: Int) {
                      val e = events[position]
                      holder.dest.text = "${'$'}{e.destIp}:${'$'}{e.port}"
                      holder.details.text = "${'$'}{e.protocol} ${'$'}{e.direction} via ${'$'}{e.appName}"
                      val bytes = e.bytesTransferred
                      holder.bytes.text = when {
                          bytes > 1_000_000 -> "${'$'}{bytes / 1_000_000} MB"
                          bytes > 1_000 -> "${'$'}{bytes / 1_000} KB"
                          else -> "${'$'}bytes B"
                      }
                      holder.time.text = SimpleDateFormat("HH:mm:ss", Locale.getDefault()).format(Date(e.timestamp))
                      val dot = GradientDrawable()
                      dot.shape = GradientDrawable.OVAL
                      dot.setColor(when {
                          e.riskLevel > 60 -> Color.parseColor("#F44336")
                          e.riskLevel > 30 -> Color.parseColor("#FF9800")
                          else -> Color.parseColor("#4CAF50")
                      })
                      holder.riskDot.background = dot
                  }

                  override fun getItemCount() = events.size

                  class VH(v: View) : RecyclerView.ViewHolder(v) {
                      val dest: TextView = v.findViewById(R.id.tvEventDest)
                      val details: TextView = v.findViewById(R.id.tvEventDetails)
                      val bytes: TextView = v.findViewById(R.id.tvEventBytes)
                      val time: TextView = v.findViewById(R.id.tvEventTime)
                      val riskDot: View = v.findViewById(R.id.viewRiskDot)
                  }
              }
          """)

          w(f"{SRC}/MainActivity.kt", """
              package com.netmonitor.pro

              import android.graphics.Color
              import android.os.Bundle
              import android.os.Handler
              import android.os.Looper
              import android.view.View
              import android.widget.ProgressBar
              import android.widget.TextView
              import androidx.appcompat.app.AppCompatActivity
              import androidx.recyclerview.widget.LinearLayoutManager
              import androidx.recyclerview.widget.RecyclerView
              import com.google.android.material.card.MaterialCardView
              import com.netmonitor.pro.core.*
              import com.netmonitor.pro.ml.BehaviorModel
              import com.netmonitor.pro.ui.EventAdapter
              import com.netmonitor.pro.ui.FlowGraphView
              import kotlin.random.Random

              class MainActivity : AppCompatActivity() {
                  private lateinit var tvRiskScore: TextView
                  private lateinit var tvRiskLabel: TextView
                  private lateinit var progressRisk: ProgressBar
                  private lateinit var tvConnections: TextView
                  private lateinit var tvData: TextView
                  private lateinit var cardAlerts: MaterialCardView
                  private lateinit var tvAlerts: TextView
                  private lateinit var flowGraph: FlowGraphView
                  private val handler = Handler(Looper.getMainLooper())
                  private val adapter = EventAdapter()
                  private val allEvents = mutableListOf<NetEvent>()
                  private val extractor = FeatureExtractor()
                  private val riskEngine = RiskEngine()
                  private val leakDetector = LeakDetector()
                  private val model = BehaviorModel()
                  private var totalBytes = 0L
                  private var count = 0
                  private val dests = listOf("142.250.80.46","31.13.71.36","157.240.1.35","104.244.42.1","52.94.236.248","13.107.42.14","185.60.218.35","151.101.1.140")
                  private val apps = listOf("Chrome","WeChat","Alipay","Douyin","Taobao","System","Maps","Mail")
                  private val protos = listOf("TCP","TCP","TCP","UDP","HTTPS","DNS")

                  override fun onCreate(savedInstanceState: Bundle?) {
                      super.onCreate(savedInstanceState)
                      setContentView(R.layout.activity_main)
                      tvRiskScore = findViewById(R.id.tvRiskScore)
                      tvRiskLabel = findViewById(R.id.tvRiskLabel)
                      progressRisk = findViewById(R.id.progressRisk)
                      tvConnections = findViewById(R.id.tvConnections)
                      tvData = findViewById(R.id.tvDataTransferred)
                      cardAlerts = findViewById(R.id.cardAlerts)
                      tvAlerts = findViewById(R.id.tvAlerts)
                      flowGraph = findViewById(R.id.flowGraph)
                      val rv = findViewById<RecyclerView>(R.id.rvEvents)
                      rv.layoutManager = LinearLayoutManager(this)
                      rv.adapter = adapter
                      EventBus.subscribe { e -> runOnUiThread {
                          allEvents.add(e); if (allEvents.size > 200) allEvents.removeAt(0)
                          count++; totalBytes += e.bytesTransferred; adapter.addEvent(e); update()
                      }}
                      handler.post(object : Runnable { override fun run() {
                          EventBus.publish(NetEvent(sourceIp="192.168.1.${'$'}{Random.nextInt(2,50)}", destIp=dests.random(), protocol=protos.random(),
                              port=listOf(80,443,8080,53,3000,8443,9090).random(), bytesTransferred=Random.nextLong(100,500_000),
                              direction=if(Random.nextBoolean()) "OUT" else "IN", appName=apps.random(), riskLevel=Random.nextInt(0,100)))
                          handler.postDelayed(this, Random.nextLong(1000, 3000))
                      }})
                  }
                  private fun update() {
                      tvConnections.text = count.toString()
                      tvData.text = when { totalBytes>1_000_000_000->"${'$'}{totalBytes/1_000_000_000} GB"; totalBytes>1_000_000->"${'$'}{totalBytes/1_000_000} MB"; totalBytes>1_000->"${'$'}{totalBytes/1_000} KB"; else->"${'$'}totalBytes B" }
                      val feat = extractor.extract(allEvents.takeLast(50)); model.train(feat)
                      val score = riskEngine.evaluate(feat); val label = riskEngine.getRiskLabel(score)
                      tvRiskScore.text = score.toString(); tvRiskLabel.text = label; progressRisk.progress = score
                      val c = when { score>60->Color.parseColor("#F44336"); score>30->Color.parseColor("#FF9800"); else->Color.parseColor("#4CAF50") }
                      tvRiskScore.setTextColor(c); tvRiskLabel.setTextColor(c)
                      flowGraph.addPoint(allEvents.lastOrNull()?.bytesTransferred?.toFloat() ?: 0f)
                      val alerts = leakDetector.scan(allEvents.takeLast(100))
                      if (alerts.isNotEmpty()) { cardAlerts.visibility = View.VISIBLE; tvAlerts.text = alerts.joinToString("\n") { it.message } }
                      else { cardAlerts.visibility = View.GONE }
                  }
                  override fun onDestroy() { super.onDestroy(); handler.removeCallbacksAndMessages(null); EventBus.clear() }
              }
          """)

          # ===================== LAYOUTS =====================

          w(f"{RES}/layout/activity_main.xml", """
              <?xml version="1.0" encoding="utf-8"?>
              <ScrollView xmlns:android="http://schemas.android.com/apk/res/android"
                  xmlns:app="http://schemas.android.com/apk/res-auto"
                  android:layout_width="match_parent" android:layout_height="match_parent" android:background="#F5F5F5">
                <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="vertical" android:padding="16dp">
                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="NetMonitor Pro" android:textSize="26sp" android:textStyle="bold" android:textColor="#1976D2" android:layout_marginBottom="2dp"/>
                  <TextView android:id="@+id/tvStatus" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Monitoring Active" android:textSize="13sp" android:textColor="#4CAF50" android:layout_marginBottom="16dp"/>
                  <com.google.android.material.card.MaterialCardView android:layout_width="match_parent" android:layout_height="wrap_content" android:layout_marginBottom="12dp" app:cardCornerRadius="12dp" app:cardElevation="4dp">
                    <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="vertical" android:padding="20dp">
                      <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Risk Level" android:textSize="13sp" android:textColor="#757575"/>
                      <TextView android:id="@+id/tvRiskScore" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="0" android:textSize="48sp" android:textStyle="bold" android:textColor="#4CAF50"/>
                      <TextView android:id="@+id/tvRiskLabel" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="LOW" android:textSize="15sp" android:textColor="#4CAF50"/>
                      <ProgressBar android:id="@+id/progressRisk" style="?android:attr/progressBarStyleHorizontal" android:layout_width="match_parent" android:layout_height="8dp" android:layout_marginTop="8dp" android:max="100" android:progress="0"/>
                    </LinearLayout>
                  </com.google.android.material.card.MaterialCardView>
                  <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="horizontal" android:layout_marginBottom="12dp">
                    <com.google.android.material.card.MaterialCardView android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:layout_marginEnd="6dp" app:cardCornerRadius="12dp" app:cardElevation="4dp">
                      <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="vertical" android:padding="16dp">
                        <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Connections" android:textSize="12sp" android:textColor="#757575"/>
                        <TextView android:id="@+id/tvConnections" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="0" android:textSize="24sp" android:textStyle="bold" android:textColor="#1976D2"/>
                      </LinearLayout>
                    </com.google.android.material.card.MaterialCardView>
                    <com.google.android.material.card.MaterialCardView android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:layout_marginStart="6dp" app:cardCornerRadius="12dp" app:cardElevation="4dp">
                      <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="vertical" android:padding="16dp">
                        <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Data" android:textSize="12sp" android:textColor="#757575"/>
                        <TextView android:id="@+id/tvDataTransferred" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="0 KB" android:textSize="24sp" android:textStyle="bold" android:textColor="#1976D2"/>
                      </LinearLayout>
                    </com.google.android.material.card.MaterialCardView>
                  </LinearLayout>
                  <com.google.android.material.card.MaterialCardView android:id="@+id/cardAlerts" android:layout_width="match_parent" android:layout_height="wrap_content" android:layout_marginBottom="12dp" android:visibility="gone" app:cardCornerRadius="12dp" app:cardElevation="4dp" app:cardBackgroundColor="#FFF3E0">
                    <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="vertical" android:padding="16dp">
                      <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Alerts" android:textSize="15sp" android:textStyle="bold" android:textColor="#E65100"/>
                      <TextView android:id="@+id/tvAlerts" android:layout_width="wrap_content" android:layout_height="wrap_content" android:layout_marginTop="4dp" android:textSize="13sp" android:textColor="#BF360C"/>
                    </LinearLayout>
                  </com.google.android.material.card.MaterialCardView>
                  <com.google.android.material.card.MaterialCardView android:layout_width="match_parent" android:layout_height="wrap_content" android:layout_marginBottom="12dp" app:cardCornerRadius="12dp" app:cardElevation="4dp">
                    <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="vertical" android:padding="16dp">
                      <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Network Flow" android:textSize="13sp" android:textColor="#757575" android:layout_marginBottom="8dp"/>
                      <com.netmonitor.pro.ui.FlowGraphView android:id="@+id/flowGraph" android:layout_width="match_parent" android:layout_height="180dp"/>
                    </LinearLayout>
                  </com.google.android.material.card.MaterialCardView>
                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Recent Events" android:textSize="17sp" android:textStyle="bold" android:textColor="#333333" android:layout_marginBottom="8dp"/>
                  <androidx.recyclerview.widget.RecyclerView android:id="@+id/rvEvents" android:layout_width="match_parent" android:layout_height="wrap_content" android:nestedScrollingEnabled="false"/>
                </LinearLayout>
              </ScrollView>
          """)

          w(f"{RES}/layout/item_event.xml", """
              <?xml version="1.0" encoding="utf-8"?>
              <com.google.android.material.card.MaterialCardView xmlns:android="http://schemas.android.com/apk/res/android" xmlns:app="http://schemas.android.com/apk/res-auto"
                  android:layout_width="match_parent" android:layout_height="wrap_content" android:layout_marginBottom="8dp" app:cardCornerRadius="8dp" app:cardElevation="2dp">
                <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="horizontal" android:padding="12dp" android:gravity="center_vertical">
                  <View android:id="@+id/viewRiskDot" android:layout_width="12dp" android:layout_height="12dp"/>
                  <LinearLayout android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:orientation="vertical" android:layout_marginStart="12dp">
                    <TextView android:id="@+id/tvEventDest" android:layout_width="wrap_content" android:layout_height="wrap_content" android:textSize="14sp" android:textStyle="bold" android:textColor="#333333"/>
                    <TextView android:id="@+id/tvEventDetails" android:layout_width="wrap_content" android:layout_height="wrap_content" android:textSize="12sp" android:textColor="#757575"/>
                  </LinearLayout>
                  <LinearLayout android:layout_width="wrap_content" android:layout_height="wrap_content" android:orientation="vertical" android:gravity="end">
                    <TextView android:id="@+id/tvEventBytes" android:layout_width="wrap_content" android:layout_height="wrap_content" android:textSize="12sp" android:textStyle="bold" android:textColor="#1976D2"/>
                    <TextView android:id="@+id/tvEventTime" android:layout_width="wrap_content" android:layout_height="wrap_content" android:textSize="11sp" android:textColor="#9E9E9E"/>
                  </LinearLayout>
                </LinearLayout>
              </com.google.android.material.card.MaterialCardView>
          """)

          w("server/app.py", 'from flask import Flask, request\n\napp = Flask(__name__)\ndb = []\n\n\n@app.route(\'/ingest\', methods=[\'POST\'])\ndef ingest():\n    db.append(request.json)\n    return {"ok": True}\n\n\n@app.route(\'/stats\')\ndef stats():\n    return {"size": len(db)}\n')

          print("\nAll files created successfully!")

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add android/ server/
          git status
          git diff --cached --quiet && echo "No changes" || git commit -m "feat: add complete Android UI with network monitoring dashboard"
          git push
