name: Setup Android UI v2

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract project files
        run: |
          echo "" | base64 -d | tar xzf -
          echo "Files extracted:"
          find android/ server/ -type f | sort

      - name: Clean old directories
        run: |
          rm -rf android/core android/ml android/ui android/MainActivity.kt .giuhub
          echo "Old directories cleaned"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add android/ server/
          git status
          git diff --cached --quiet && echo "No changes" || git commit -m "feat: complete Android UI upgrade - Chinese, Xposed, logs, settings"
          git push
