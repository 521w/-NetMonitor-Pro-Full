name: build-netmonitor

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# 同一分支的新提交自动取消旧的运行，节省资源
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # Job 1: Android 模块构建（Kotlin）
  # ============================================================
  build-android:
    name: 🤖 Build Android
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: |
          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
          else
            echo "::warning::gradlew not found in android/, skipping"
          fi

      - name: Run Android Lint
        continue-on-error: true
        run: |
          if [ -f "./gradlew" ]; then
            ./gradlew lint --no-daemon
          else
            echo "::warning::gradlew not found, skipping lint"
          fi

      - name: Run unit tests
        continue-on-error: true
        run: |
          if [ -f "./gradlew" ]; then
            ./gradlew test --no-daemon
          else
            echo "::warning::gradlew not found, skipping tests"
          fi

      - name: Build Release APK
        run: |
          if [ -f "./gradlew" ]; then
            ./gradlew assembleRelease --no-daemon
          else
            echo "::error::gradlew not found — cannot build Android module"
            echo "请在 android/ 目录初始化 Gradle 项目"
            exit 1
          fi

      - name: Upload Android APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 14
          if-no-files-found: warn

  # ============================================================
  # Job 2: eBPF 内核模块构建（C）
  # ============================================================
  build-ebpf:
    name: 🔬 Build eBPF
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install eBPF build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang llvm libbpf-dev \
            linux-headers-$(uname -r) make gcc

      - name: Compile eBPF kernel module
        working-directory: ebpf
        run: |
          clang -O2 -g -target bpf \
            -D__TARGET_ARCH_x86 \
            -I/usr/include/$(uname -m)-linux-gnu \
            -c netmon_kern.c \
            -o netmon_kern.o
          echo "✅ eBPF object compiled successfully"
          ls -lh netmon_kern.o

      - name: Upload eBPF object
        uses: actions/upload-artifact@v4
        with:
          name: ebpf-object
          path: ebpf/netmon_kern.o
          retention-days: 14

  # ============================================================
  # Job 3: Server 模块检查（Python）
  # ============================================================
  build-server:
    name: 🐍 Build Server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: server/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "::warning::requirements.txt not found"
            pip install flask
          fi
          pip install flake8 pytest

      - name: Lint with flake8
        continue-on-error: true
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --max-complexity=10 --max-line-length=120 --statistics

      - name: Run tests
        continue-on-error: true
        run: |
          if [ -d "tests" ] || ls test_*.py 1>/dev/null 2>&1; then
            pytest -v
          else
            echo "::warning::No test files found, skipping"
          fi

      - name: Validate Python syntax
        run: |
          python -m py_compile app.py
          echo "✅ app.py syntax OK"

  # ============================================================
  # Job 4: 打包发布（三个模块全部成功后执行）
  # ============================================================
  package-release:
    name: 📦 Package Release
    runs-on: ubuntu-latest
    needs: [build-android, build-ebpf, build-server]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: release/android/

      - name: Download eBPF object
        uses: actions/download-artifact@v4
        with:
          name: ebpf-object
          path: release/ebpf/

      - name: Prepare server & scripts
        run: |
          mkdir -p release/server release/scripts
          cp -r server/* release/server/
          cp -r scripts/* release/scripts/

      - name: Generate build info
        run: |
          cat > release/BUILD_INFO.txt << EOF
          NetMonitor Pro Full — Build Info
          ================================
          Build Time : $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          Commit SHA : ${{ github.sha }}
          Branch     : ${{ github.ref_name }}
          Runner OS  : ${{ runner.os }}
          Triggered  : ${{ github.event_name }}
          EOF
          cat release/BUILD_INFO.txt

      - name: Create release archive
        run: |
          cd release
          zip -r ../NetMonitor-Pro-Full-${{ github.sha }}.zip .

      - name: Upload release package
        uses: actions/upload-artifact@v4
        with:
          name: NetMonitor-Pro-Full-${{ github.ref_name }}-${{ github.run_number }}
          path: NetMonitor-Pro-Full-*.zip
          retention-days: 30
