name: Setup Android Project

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create Android project structure
        shell: python3 {0}
        run: |
          import os, shutil

          def w(path, content):
              os.makedirs(os.path.dirname(path), exist_ok=True)
              with open(path, "w") as f:
                  f.write(content)
              print(f"  + {path}")

          def read(path):
              if os.path.isfile(path):
                  with open(path) as f:
                      return f.read()
              return ""

          BASE = "android/app/src/main/java/com/netmonitor/pro"

          # ── Read existing source code ──
          print("Reading source files...")
          core_files = {}
          for name in ["EventBus.kt","FeatureExtractor.kt","FeatureVector.kt","LeakDetector.kt","NetEvent.kt","RiskEngine.kt"]:
              core_files[name] = read(f"android/core/{name}")
          ml_src = read("android/ml/BehaviorModel.kt")
          ui_src = read("android/ui/FlowGraphView.kt")
          main_src = read("android/MainActivity.kt")

          # ── Gradle build files ──
          print("Creating Gradle files...")
          w("android/settings.gradle.kts", 'pluginManagement {\n    repositories {\n        google()\n        mavenCentral()\n        gradlePluginPortal()\n    }\n}\n\n@Suppress("UnstableApiUsage")\ndependencyResolutionManagement {\n    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)\n    repositories {\n        google()\n        mavenCentral()\n    }\n}\n\nrootProject.name = "NetMonitorPro"\ninclude(":app")\n')

          w("android/build.gradle.kts", 'plugins {\n    id("com.android.application") version "8.5.2" apply false\n    id("org.jetbrains.kotlin.android") version "2.0.21" apply false\n}\n')

          w("android/gradle.properties", 'org.gradle.jvmargs=-Xmx2g -XX:+HeapDumpOnOutOfMemoryError\norg.gradle.parallel=true\norg.gradle.caching=true\nandroid.useAndroidX=true\nandroid.nonTransitiveRClass=true\n')

          w("android/app/build.gradle.kts", 'plugins {\n    id("com.android.application")\n    id("org.jetbrains.kotlin.android")\n}\n\nandroid {\n    namespace = "com.netmonitor.pro"\n    compileSdk = 34\n\n    defaultConfig {\n        applicationId = "com.netmonitor.pro"\n        minSdk = 26\n        targetSdk = 34\n        versionCode = 1\n        versionName = "1.0.0"\n    }\n\n    buildTypes {\n        release {\n            isMinifyEnabled = false\n            proguardFiles(\n                getDefaultProguardFile("proguard-android-optimize.txt"),\n                "proguard-rules.pro"\n            )\n        }\n    }\n\n    compileOptions {\n        sourceCompatibility = JavaVersion.VERSION_17\n        targetCompatibility = JavaVersion.VERSION_17\n    }\n\n    kotlinOptions {\n        jvmTarget = "17"\n    }\n}\n\ndependencies {\n    implementation("androidx.core:core-ktx:1.13.1")\n    implementation("androidx.appcompat:appcompat:1.7.0")\n    implementation("com.google.android.material:material:1.12.0")\n}\n')

          w("android/app/proguard-rules.pro", "-keepattributes SourceFile,LineNumberTable\n-renamesourcefileattribute SourceFile\n")

          # ── Android resources ──
          print("Creating Android resources...")
          w("android/app/src/main/AndroidManifest.xml", '<?xml version="1.0" encoding="utf-8"?>\n<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />\n    <application\n        android:allowBackup="false"\n        android:label="@string/app_name"\n        android:supportsRtl="true"\n        android:theme="@style/Theme.NetMonitor">\n        <activity android:name=".MainActivity" android:exported="true">\n            <intent-filter>\n                <action android:name="android.intent.action.MAIN" />\n                <category android:name="android.intent.category.LAUNCHER" />\n            </intent-filter>\n        </activity>\n    </application>\n</manifest>\n')

          w("android/app/src/main/res/values/strings.xml", '<?xml version="1.0" encoding="utf-8"?>\n<resources>\n    <string name="app_name">NetMonitor Pro</string>\n</resources>\n')

          w("android/app/src/main/res/values/themes.xml", '<?xml version="1.0" encoding="utf-8"?>\n<resources>\n    <style name="Theme.NetMonitor" parent="Theme.MaterialComponents.DayNight.NoActionBar">\n        <item name="colorPrimary">#1976D2</item>\n        <item name="colorPrimaryVariant">#0D47A1</item>\n        <item name="colorOnPrimary">#FFFFFF</item>\n        <item name="colorSecondary">#26A69A</item>\n    </style>\n</resources>\n')

          # ── Migrate source code with package declarations ──
          print("Migrating Kotlin source code...")
          pkg = "package com.netmonitor.pro.core\n\n"
          for name, src in core_files.items():
              if src:
                  w(f"{BASE}/core/{name}", pkg + src.rstrip() + "\n")

          if ml_src:
              w(f"{BASE}/ml/BehaviorModel.kt", "package com.netmonitor.pro.ml\n\nimport com.netmonitor.pro.core.FeatureVector\n\n" + ml_src.rstrip() + "\n")

          if ui_src:
              w(f"{BASE}/ui/FlowGraphView.kt", "package com.netmonitor.pro.ui\n\nimport com.netmonitor.pro.core.NetEvent\n\n" + ui_src.rstrip() + "\n")

          if main_src:
              w(f"{BASE}/MainActivity.kt", "package com.netmonitor.pro\n\nimport com.netmonitor.pro.core.*\nimport com.netmonitor.pro.ml.BehaviorModel\nimport com.netmonitor.pro.ui.FlowGraphView\n\n" + main_src.rstrip() + "\n")

          # ── Clean up old files ──
          print("Cleaning up old files...")
          for d in ["android/core", "android/ml", "android/ui"]:
              if os.path.isdir(d):
                  shutil.rmtree(d)
                  print(f"  - {d}/")
          if os.path.isfile("android/MainActivity.kt"):
              os.remove("android/MainActivity.kt")
              print("  - android/MainActivity.kt")
          if os.path.isdir(".giuhub"):
              shutil.rmtree(".giuhub")
              print("  - .giuhub/")

          # ── Fix server/app.py ──
          print("Fixing server/app.py...")
          w("server/app.py", "from flask import Flask, request\n\napp = Flask(__name__)\ndb = []\n\n\n@app.route('/ingest', methods=['POST'])\ndef ingest():\n    db.append(request.json)\n    return {\"ok\": True}\n\n\n@app.route('/stats')\ndef stats():\n    return {\"size\": len(db)}\n")

          print("\nDONE! All files created successfully.")

      - name: Update build workflow
        run: |
          cat > .github/workflows/build.yml << 'BUILDEOF'
          name: build-netmonitor
          on:
            push:
              branches: [main]
            pull_request:
              branches: [main]
            workflow_dispatch:
          concurrency:
            group: ${{ github.workflow }}-${{ github.ref }}
            cancel-in-progress: true
          jobs:
            build-android:
              name: "Build Android APK"
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-java@v4
                  with:
                    distribution: temurin
                    java-version: 17
                - uses: gradle/actions/setup-gradle@v4
                  with:
                    gradle-version: 8.9
                    build-root-directory: android
                - name: Build Debug APK
                  working-directory: android
                  run: gradle assembleDebug --no-daemon --stacktrace
                - name: Build Release APK
                  working-directory: android
                  run: gradle assembleRelease --no-daemon --stacktrace
                - name: Upload Debug APK
                  uses: actions/upload-artifact@v4
                  with:
                    name: NetMonitor-Pro-debug
                    path: android/app/build/outputs/apk/debug/*.apk
                    retention-days: 14
                - name: Upload Release APK
                  uses: actions/upload-artifact@v4
                  with:
                    name: NetMonitor-Pro-release
                    path: android/app/build/outputs/apk/release/*.apk
                    retention-days: 30
            build-ebpf:
              name: "Build eBPF"
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4
                - name: Install dependencies
                  run: |
                    sudo apt-get update -qq
                    sudo apt-get install -y --no-install-recommends clang llvm libbpf-dev make gcc
                - name: Obtain vmlinux.h
                  run: |
                    if [ -f ebpf/vmlinux.h ]; then exit 0; fi
                    for URL in \
                      "https://raw.githubusercontent.com/libbpf/vmlinux.h/main/include/x86_64/vmlinux.h" \
                      "https://raw.githubusercontent.com/libbpf/vmlinux.h/main/include/x86/vmlinux.h"; do
                      if curl -fsSL --retry 3 "$URL" -o ebpf/vmlinux.h 2>/dev/null; then
                        LINES=$(wc -l < ebpf/vmlinux.h)
                        if [ "$LINES" -gt 1000 ]; then echo "vmlinux.h OK ($LINES lines)"; exit 0; fi
                        rm -f ebpf/vmlinux.h
                      fi
                    done
                    echo "::error::Cannot obtain vmlinux.h"; exit 1
                - name: Compile eBPF
                  working-directory: ebpf
                  run: |
                    clang -O2 -g -target bpf -D__TARGET_ARCH_x86 -I. -I/usr/include/$(uname -m)-linux-gnu -c netmon_kern.c -o netmon_kern.o
                    ls -lh netmon_kern.o
                - uses: actions/upload-artifact@v4
                  with:
                    name: ebpf-object
                    path: ebpf/netmon_kern.o
                    retention-days: 14
            check-server:
              name: "Check Server"
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-python@v5
                  with:
                    python-version: "3.11"
                - name: Lint and test
                  working-directory: server
                  run: |
                    pip install flask flake8
                    python -m py_compile app.py && echo "Syntax OK"
                    flake8 . --count --max-line-length=120 --show-source --statistics
                    python -c "from app import app; assert app; print('Flask app OK')"
            package:
              name: "Package Release"
              runs-on: ubuntu-latest
              needs: [build-android, build-ebpf, check-server]
              if: github.ref == 'refs/heads/main' && github.event_name == 'push'
              steps:
                - uses: actions/checkout@v4
                - uses: actions/download-artifact@v4
                  with:
                    path: artifacts/
                - name: Create release
                  run: |
                    mkdir -p release
                    cp -r artifacts/NetMonitor-Pro-debug/* release/ 2>/dev/null || true
                    cp -r artifacts/NetMonitor-Pro-release/* release/ 2>/dev/null || true
                    cp -r artifacts/ebpf-object/* release/ 2>/dev/null || true
                    cp -r server/ release/server/
                    cp -r scripts/ release/scripts/
                    cd release && zip -r ../NetMonitor-Pro-Full.zip .
                - uses: actions/upload-artifact@v4
                  with:
                    name: NetMonitor-Pro-Full-build${{ github.run_number }}
                    path: NetMonitor-Pro-Full.zip
                    retention-days: 30
          BUILDEOF

      - name: Commit and push all changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git status
          git commit -m "feat: setup complete Android project structure for APK build"
          git push